<!DOCTYPE html>
<html>
    <head>
        <style>
            button{
                background-color: blue;
                color: white;
                padding: 20px;
                transition-property: background-color;
                transition-duration: 0.5s;
            }
            button:hover{
                background-color: red;
            }
        </style>
    </head>

    <body>
        <button>Hover Me</button>
    </body>
</html>
