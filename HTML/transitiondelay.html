<!DOCTYPE html>
<html>
    <head>
        <style>
            button{
                background-color: yellow;
                color: black;
                padding: 20px;
                transition-property: background-color;
                transition-duration: 1s;
                transition-delay: 0s;
            }
            button:hover{
                background-color: red;
            }
        </style>
    </head>

    <body>
        <button>Click Me</button>
    </body>
</html>
