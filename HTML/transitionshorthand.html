<!DOCTYPE html>
<html>
    <head>
        <style>
            button{
                background-color: violet;
                color: black;
                padding: 20px;
                transition: background-color 0.3s ease-in;
            }
            button:hover{
                transform: scale(1.1);        
                background-color: crimson;
            }
        </style>
    </head>

    <body>
        <button>Click Me</button>
    </body>
</html>
