<!DOCTYPE html>
<html>
    <head>
        <style>
            .webpage{
                display: grid;
                width: 100px;
                height: 100px;
                background-color: blueviolet;
                border: 2px black;

                transition: transform 0.5s ease;
            }
            .webpage:hover{
                transform: translateX(150px);
            }
        </style>
    </head>

    <body>
        <div class="webpage"></div>
    </body>
</html>
