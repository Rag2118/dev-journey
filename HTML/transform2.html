<!DOCTYPE html>
<html>
    <head>
        <style>
            .box{
                display: grid;
                width: 100px;
                height: 100px;
                background-color: aqua;
                place-items: center;
                display: grid;
                
                transition: transform 0.5s ease;
            }
            .box:hover{
                transform: rotate(360deg);
            }
        </style>
    </head>

    <body>
        <div class="box"></div>
    </body>
</html>
